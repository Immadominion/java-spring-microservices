name: CI/CD — Build, Test & Deploy Microservices

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ──────────────────────────────────────────────
  #  Stage 1: Build & Test (5 services in parallel)
  # ──────────────────────────────────────────────
  build-auth-service:
    name: Build Auth Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: auth-service
      - name: Run Tests
        run: mvn test
        working-directory: auth-service

  build-patient-service:
    name: Build Patient Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: patient-service
      - name: Run Tests
        run: mvn test
        working-directory: patient-service

  build-billing-service:
    name: Build Billing Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: billing-service
      - name: Run Tests
        run: mvn test
        working-directory: billing-service

  build-analytics-service:
    name: Build Analytics Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: analytics-service
      - name: Run Tests
        run: mvn test
        working-directory: analytics-service

  build-api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: api-gateway
      - name: Run Tests
        run: mvn test
        working-directory: api-gateway

  # ──────────────────────────────────────────────
  #  Stage 2: Build Docker Images
  # ──────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - build-auth-service
      - build-patient-service
      - build-billing-service
      - build-analytics-service
      - build-api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Build Auth Service Image
        run: docker build -t patient-mgmt/auth-service:${{ github.sha }} ./auth-service
      - name: Build Patient Service Image
        run: docker build -t patient-mgmt/patient-service:${{ github.sha }} ./patient-service
      - name: Build Billing Service Image
        run: docker build -t patient-mgmt/billing-service:${{ github.sha }} ./billing-service
      - name: Build Analytics Service Image
        run: docker build -t patient-mgmt/analytics-service:${{ github.sha }} ./analytics-service
      - name: Build API Gateway Image
        run: docker build -t patient-mgmt/api-gateway:${{ github.sha }} ./api-gateway
      - name: Verify Images
        run: docker images | grep patient-mgmt

  # ──────────────────────────────────────────────
  #  Stage 3: Deploy to AWS EC2
  #  Only runs on push to main/master (not PRs)
  # ──────────────────────────────────────────────
  deploy-to-aws:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            echo "=== Deploying to EC2 ==="
            cd ~/java-spring-microservices

            echo "--- Pulling latest code ---"
            git pull origin main || git pull origin master

            echo "--- Rebuilding and restarting containers ---"
            docker compose down
            docker compose up --build -d

            echo "--- Waiting for services to start (60s) ---"
            sleep 60

            echo "--- Deployment Health Check ---"
            echo "Running containers:"
            docker compose ps

            echo ""
            echo "Service endpoints:"
            echo "  API Gateway:     http://$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4):4004"
            echo "  Prometheus:      http://$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4):9090"
            echo "  Grafana:         http://$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4):3000"

            echo ""
            echo "=== Deployment Complete ✓ ==="
